<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 21st Birthday Kitz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #fff7d6 0%, #ffe89a 40%, #ffd447 100%);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px 60px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Decorative sunflowers */
  .deco {
    font-size: 2rem;
    position: absolute;
    pointer-events: none;
    user-select: none;
    opacity: 0.55;
    animation: sway 4s ease-in-out infinite;
  }
  .deco.tl { top: 24px; left: 18px; animation-delay: 0s; }
  .deco.tr { top: 18px; right: 22px; animation-delay: 1s; }
  .deco.bl { bottom: 30px; left: 22px; animation-delay: 2s; }
  .deco.br { bottom: 24px; right: 18px; animation-delay: 0.5s; }
  @keyframes sway {
    0%,100% { transform: rotate(-8deg) scale(1); }
    50% { transform: rotate(8deg) scale(1.1); }
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #ffde59 0%, #f9a825 50%, #e65c00 100%);
    border-radius: 32px 32px 0 0;
    width: 100%;
    padding: 36px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(230,92,0,0.18);
  }

  .avatar-wrap {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid #fff;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    background: #ffe082;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
  }
  .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }

  .name {
    font-size: 1.6rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    letter-spacing: 0.5px;
  }

  .tagline {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    text-align: center;
  }

  /* Sunray divider */
  .divider {
    width: 100%;
    height: 28px;
    background: linear-gradient(135deg, #f9a825 0%, #e65c00 100%);
    clip-path: polygon(0 0, 100% 0, 100% 40%, 50% 100%, 0 40%);
  }

  /* Links area */
  .links {
    background: #fffde7;
    width: 100%;
    border-radius: 0 0 32px 32px;
    padding: 12px 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 8px 32px rgba(230,92,0,0.10);
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    padding: 16px 20px;
    border-radius: 16px;
    font-size: 1rem;
    font-weight: 700;
    transition: transform 0.18s, box-shadow 0.18s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    color: #5a3a00;
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.13); }

  .btn-yt {
    background: linear-gradient(135deg, #ffde59, #ffc107);
    border: 2px solid #f9a825;
  }
  .btn-blog {
    background: linear-gradient(135deg, #ffe082, #ffb300);
    border: 2px solid #e65c00;
  }

  .btn-icon { font-size: 1.4rem; flex-shrink: 0; }

  .btn-text { display: flex; flex-direction: column; }
  .btn-label { font-size: 0.72rem; font-weight: 600; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.8px; }
  .btn-title { font-size: 1rem; font-weight: 800; }

  .sun-footer { font-size: 1.2rem; text-align: center; margin-top: 8px; opacity: 0.5; letter-spacing: 4px; }
</style>
</head>
<body>

<span class="deco tl">🌻</span>
<span class="deco tr">☀️</span>
<span class="deco bl">🌼</span>
<span class="deco br">🌻</span>

<div class="card">
  <div class="header">
    <div class="avatar-wrap"><img src="WhatsApp Image 2026-03-06 at 18.45.22 (2).jpeg" alt="Your Name"></div>
    <div class="name">Happy 21st Birthday Kitz</div>
    <div class="tagline">✨ i love you to the moon and back ✨</div>
  </div>

  <div class="divider"></div>

  <div class="links">
    <a href="https://music.youtube.com/playlist?list=PL0RuDni4P02lNB5OZXGlukVoOM4GaRHM6" target="_blank" class="btn btn-yt">
      <span class="btn-icon">▶️</span>
      <span class="btn-text">
        <span class="btn-label"></span>
        <span class="btn-title">🎵Surprise</span>
      </span>
    </a>

    <a href="okay.pdf" target="_blank" class="btn btn-blog">
      <span class="btn-icon">🌐</span>
      <span class="btn-text">
        <span class="btn-label">Visit</span>
        <span class="btn-title">The Kitz Times</span>
      </span>
    </a>

    <a href="#" class="btn btn-soon">
      <span class="btn-icon">🔒</span>
      <span class="btn-text">
        <span class="btn-label">Coming Soon</span>
        <span class="btn-title">Available on March 16th</span>
      </span>
    </a>

    <a href="#" class="btn btn-soon">
      <span class="btn-icon">🔒</span>
      <span class="btn-text">
        <span class="btn-label">Coming Soon</span>
        <span class="btn-title">Available on March 17th</span>
      </span>
    </a>

    <div class="sun-footer">☀️ 🌻 ☀️</div>
  </div>
</div>

</body>
</html>
